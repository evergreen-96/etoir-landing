server {
    listen 80;
    server_name demo.e-toir.ru preprod.e-toir.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name demo.e-toir.ru;

    ssl_certificate     /etc/letsencrypt/live/demo.e-toir.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.e-toir.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://host.docker.internal:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

server {
    listen 443 ssl;
    server_name preprod.e-toir.ru;

    ssl_certificate     /etc/letsencrypt/live/preprod.e-toir.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preprod.e-toir.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

server {
    listen 80;
    server_name etoir.ru www.etoir.ru e-toir.ru www.e-toir.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://etoir.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.etoir.ru e-toir.ru www.e-toir.ru;
    ssl_certificate     /etc/letsencrypt/live/etoir.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/etoir.ru/privkey.pem;
    return 301 https://etoir.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name etoir.ru;

    ssl_certificate     /etc/letsencrypt/live/etoir.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/etoir.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /app/landing;
    index index.html;

    set $frame_options 'SAMEORIGIN';
    if ($http_referer ~* '(etoir\.ru|webvisor\.com|metri[ck]a\.yandex\.(com|ru|by|com\.tr))') {
        set $frame_options '';
    }

    location /api/ {
        proxy_pass http://etoir-landing-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        proxy_pass http://etoir-landing-api:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        add_header X-Frame-Options $frame_options always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
