<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="Сравнение Excel и CMMS-системы эТОИР по 8 параметрам учёта оборудования и ТОиР">
  <rect width="1200" height="760" fill="#FFFFFF"/>

  <text x="600" y="56" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="#0F172A" text-anchor="middle">Excel против CMMS-системы — 8 параметров</text>
  <text x="600" y="86" font-family="Inter,sans-serif" font-size="15" fill="#64748B" text-anchor="middle">Что меняется при переходе с таблиц на специализированную систему ТОиР</text>

  <!-- Header строки таблицы -->
  <g font-family="Inter,sans-serif">
    <rect x="60" y="120" width="1080" height="60" rx="12" fill="#F1F5F9"/>
    <text x="100" y="158" font-size="16" font-weight="700" fill="#0F172A">Параметр</text>
    <text x="540" y="158" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle">Excel</text>
    <text x="900" y="158" font-size="16" font-weight="700" fill="#1D4ED8" text-anchor="middle">эТОИР (CMMS)</text>
  </g>

  <!-- Строки сравнения -->
  <g font-family="Inter,sans-serif" font-size="14">
    <!-- Row 1 -->
    <line x1="60" y1="200" x2="1140" y2="200" stroke="#E2E8F0"/>
    <text x="100" y="232" font-weight="600" fill="#0F172A">Учёт оборудования</text>
    <text x="540" y="232" fill="#475569" text-anchor="middle">Список строк без истории</text>
    <text x="900" y="232" fill="#1D4ED8" text-anchor="middle" font-weight="600">Карточка + QR + журнал</text>

    <!-- Row 2 -->
    <line x1="60" y1="260" x2="1140" y2="260" stroke="#E2E8F0"/>
    <rect x="60" y="260" width="1080" height="60" fill="#FAFBFF"/>
    <text x="100" y="296" font-weight="600" fill="#0F172A">Плановое ТО</text>
    <text x="540" y="296" fill="#475569" text-anchor="middle">Ручной календарь, напоминания в голове</text>
    <text x="900" y="296" fill="#1D4ED8" text-anchor="middle" font-weight="600">Авто по дате и наработке + push</text>

    <!-- Row 3 -->
    <line x1="60" y1="320" x2="1140" y2="320" stroke="#E2E8F0"/>
    <text x="100" y="356" font-weight="600" fill="#0F172A">Наряд-заказы</text>
    <text x="540" y="356" fill="#475569" text-anchor="middle">Текст в ячейке</text>
    <text x="900" y="356" fill="#1D4ED8" text-anchor="middle" font-weight="600">Объект с жизненным циклом</text>

    <!-- Row 4 -->
    <line x1="60" y1="380" x2="1140" y2="380" stroke="#E2E8F0"/>
    <rect x="60" y="380" width="1080" height="60" fill="#FAFBFF"/>
    <text x="100" y="416" font-weight="600" fill="#0F172A">Мобильный доступ слесарей</text>
    <text x="540" y="416" fill="#DC2626" text-anchor="middle">Нет</text>
    <text x="900" y="416" fill="#059669" text-anchor="middle" font-weight="600">Приложение + офлайн-режим</text>

    <!-- Row 5 -->
    <line x1="60" y1="440" x2="1140" y2="440" stroke="#E2E8F0"/>
    <text x="100" y="476" font-weight="600" fill="#0F172A">MTBF / MTTR / готовность</text>
    <text x="540" y="476" fill="#475569" text-anchor="middle">Ручные сводные, раз в квартал</text>
    <text x="900" y="476" fill="#1D4ED8" text-anchor="middle" font-weight="600">Из коробки, в реальном времени</text>

    <!-- Row 6 -->
    <line x1="60" y1="500" x2="1140" y2="500" stroke="#E2E8F0"/>
    <rect x="60" y="500" width="1080" height="60" fill="#FAFBFF"/>
    <text x="100" y="536" font-weight="600" fill="#0F172A">Уведомления и эскалации</text>
    <text x="540" y="536" fill="#DC2626" text-anchor="middle">Нет</text>
    <text x="900" y="536" fill="#059669" text-anchor="middle" font-weight="600">Email, Telegram, WhatsApp</text>

    <!-- Row 7 -->
    <line x1="60" y1="560" x2="1140" y2="560" stroke="#E2E8F0"/>
    <text x="100" y="596" font-weight="600" fill="#0F172A">Интеграции 1С / SCADA / MES</text>
    <text x="540" y="596" fill="#DC2626" text-anchor="middle">Нет</text>
    <text x="900" y="596" fill="#059669" text-anchor="middle" font-weight="600">API + готовые коннекторы</text>

    <!-- Row 8 -->
    <line x1="60" y1="620" x2="1140" y2="620" stroke="#E2E8F0"/>
    <rect x="60" y="620" width="1080" height="60" fill="#FAFBFF"/>
    <text x="100" y="656" font-weight="600" fill="#0F172A">Аудит изменений</text>
    <text x="540" y="656" fill="#DC2626" text-anchor="middle">Нет</text>
    <text x="900" y="656" fill="#059669" text-anchor="middle" font-weight="600">Полный, по каждой записи</text>

    <line x1="60" y1="680" x2="1140" y2="680" stroke="#E2E8F0"/>
  </g>

  <text x="600" y="720" font-family="Inter,sans-serif" font-size="14" fill="#1D4ED8" text-anchor="middle" font-weight="600">Источник: внедрения эТОИР на 50+ российских заводах · etoir.ru/blog/cmms-vs-excel/</text>
  <text x="600" y="744" font-family="Inter,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Лицензия CC BY 4.0 — можно использовать с указанием источника</text>
</svg>
