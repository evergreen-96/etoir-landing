<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="7 признаков, что Excel перестал справляться с учётом ТОиР">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg2)"/>

  <text x="600" y="60" font-family="Inter,sans-serif" font-size="34" font-weight="800" fill="#0F172A" text-anchor="middle">7 признаков, что Excel перестал работать для ТОиР</text>
  <text x="600" y="92" font-family="Inter,sans-serif" font-size="16" fill="#64748B" text-anchor="middle">Сигналы, по которым понятно: пора смотреть на CMMS-систему</text>

  <!-- Карточки 3 + 3 + 1 -->
  <g font-family="Inter,sans-serif">
    <!-- Row 1 -->
    <g transform="translate(60,130)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#FEE2E2"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#DC2626" text-anchor="middle">1</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">Версии файла теряются</text>
      <text x="20" y="92" font-size="13" fill="#475569">ТОиР_2026_v3_правки_Иванов.xlsx,</text>
      <text x="20" y="112" font-size="13" fill="#475569">_финал_окончательный.xlsx — какой?</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">Минимум 1 заявка теряется в неделю</text>
    </g>
    <g transform="translate(425,130)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#FEE2E2"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#DC2626" text-anchor="middle">2</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">Истории изменений нет</text>
      <text x="20" y="92" font-size="13" fill="#475569">Кто и когда поменял срок ТО</text>
      <text x="20" y="112" font-size="13" fill="#475569">с 14 на 24 мая — узнать невозможно</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">При инциденте — некого спросить</text>
    </g>
    <g transform="translate(790,130)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#FEE2E2"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#DC2626" text-anchor="middle">3</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">Нет связи объектов</text>
      <text x="20" y="92" font-size="13" fill="#475569">Переименовали «Компрессор К-2»</text>
      <text x="20" y="112" font-size="13" fill="#475569">→ ВПР и сводные ломаются</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">Списки, не объекты</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(60,300)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#FEF3C7"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#D97706" text-anchor="middle">4</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">Нет мобильности у слесарей</text>
      <text x="20" y="92" font-size="13" fill="#475569">Бумажные бегунки → ручной ввод</text>
      <text x="20" y="112" font-size="13" fill="#475569">в Excel начальником смены</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">~15% работ не попадает в учёт</text>
    </g>
    <g transform="translate(425,300)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#FEF3C7"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#D97706" text-anchor="middle">5</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">KPI не считаются</text>
      <text x="20" y="92" font-size="13" fill="#475569">MTBF и MTTR — ручные сводные</text>
      <text x="20" y="112" font-size="13" fill="#475569">по 1–2 дня, делается раз в квартал</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">Для решений — поздно</text>
    </g>
    <g transform="translate(790,300)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#FEF3C7"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#D97706" text-anchor="middle">6</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">Нет уведомлений и эскалаций</text>
      <text x="20" y="92" font-size="13" fill="#475569">Сроки межсервисных интервалов</text>
      <text x="20" y="112" font-size="13" fill="#475569">в голове у одного человека</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">Отпуск → пропущенное ТО</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(425,470)">
      <rect width="350" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="40" cy="42" r="22" fill="#E0E7FF"/>
      <text x="40" y="50" font-size="22" font-weight="800" fill="#4F46E5" text-anchor="middle">7</text>
      <text x="78" y="50" font-size="17" font-weight="700" fill="#0F172A">Интеграций нет</text>
      <text x="20" y="92" font-size="13" fill="#475569">1С, SCADA, MES — каждый отдельно</text>
      <text x="20" y="112" font-size="13" fill="#475569">Списания запчастей вручную</text>
      <text x="20" y="134" font-size="13" fill="#64748B" font-style="italic">Excel = чёрная дыра в контуре</text>
    </g>
  </g>

  <text x="600" y="660" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="#1D4ED8" text-anchor="middle">3 признака и больше → пора на CMMS</text>
</svg>
