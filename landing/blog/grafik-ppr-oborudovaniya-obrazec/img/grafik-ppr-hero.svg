      <path d="M22 2h4v8h-4zM22 38h4v8h-4zM2 22h8v4H2zM38 22h8v4h-8zM8 9l3-3 6 6-3 3zM31 32l3-3 6 6-3 3zM37 12l-3-3-6 6 3 3zM14 35l-3-3-6 6 3 3z"/>
