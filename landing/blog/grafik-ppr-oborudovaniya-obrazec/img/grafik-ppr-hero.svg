<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, 'Segoe UI', Arial, sans-serif" role="img" aria-label="График ППР оборудования: образец и пример составления 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAFBFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="card" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accentbar)"/>

  <!-- Left column: title -->
  <g>
    <text x="64" y="120" font-size="26" font-weight="800" fill="#2563EB" letter-spacing="0.5">э<tspan fill="#1E293B">ТОИР</tspan></text>
    <text x="64" y="210" font-size="52" font-weight="800" fill="#1E293B">График ППР</text>
    <text x="64" y="270" font-size="52" font-weight="800" fill="#1E293B">оборудования</text>
    <text x="64" y="330" font-size="26" font-weight="500" fill="#64748B">образец и пример составления · 2026</text>

    <!-- legend -->
    <g font-size="20" font-weight="600" fill="#1E293B">
      <rect x="64" y="380" width="34" height="34" rx="6" fill="#DBEAFE"/><text x="74" y="403" font-size="16" font-weight="700" fill="#1D4ED8">О</text><text x="110" y="403">осмотр / ТО</text>
      <rect x="64" y="426" width="34" height="34" rx="6" fill="#BBF7D0"/><text x="74" y="449" font-size="16" font-weight="700" fill="#15803D">Т</text><text x="110" y="449">текущий ремонт</text>
      <rect x="280" y="380" width="34" height="34" rx="6" fill="#FDE68A"/><text x="289" y="403" font-size="16" font-weight="700" fill="#B45309">С</text><text x="326" y="403">средний ремонт</text>
      <rect x="280" y="426" width="34" height="34" rx="6" fill="#FECACA"/><text x="290" y="449" font-size="16" font-weight="700" fill="#B91C1C">К</text><text x="326" y="449">капитальный</text>
    </g>

    <!-- gear icons -->
    <g transform="translate(96,540)" fill="#2563EB" opacity="0.9">
      <path d="M24 14a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 6a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/>
      <g fill="#F59E0B"><path d="M22 2h4v8h-4zM22 38h4v8h-4zM2 22h8v4H2zM38 22h8v4h-8zM8 9l3-3 6 6-3 3zM31 32l3-3 6 6-3 3zM37 12l-3-3-6 6 3 3zM14 35l-3-3-6 6 3 3z"/></g>
