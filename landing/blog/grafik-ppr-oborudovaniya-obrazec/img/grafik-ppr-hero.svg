    <rect x="28" y="300" width="460" height="80" rx="12" fill="#EFF6FF"/>
    <text x="48" y="332" font-size="15" font-weight="700" fill="#1D4ED8">Межремонтный цикл</text>
    <text x="48" y="358" font-size="13" fill="#1E293B">К — О — Т — О — Т — О — С — О — Т — О — Т — О — К</text>
