<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: #2563EB;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .logo {
            font-size: 72px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }
        .logo span { color: #FEF3C7; }
        .tagline {
            font-size: 32px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            text-align: center;
            max-width: 800px;
            line-height: 1.4;
            margin-bottom: 32px;
        }
        .url {
            font-size: 22px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }
        .badge {
            position: absolute;
            top: 40px;
            right: 48px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 16px;
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="badge">ТОиР / CMMS</div>
    <div class="logo">e<span>Toir</span></div>
    <div class="tagline">Система управления ТОиР<br>для промышленных предприятий</div>
    <div class="url">etoir.ru</div>
</body>
</html>
